name: Docker Build & Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ttyd_version:
        description: 'TTYD Version'
        required: true
        default: '1.7.7'
      zellij_version:
        description: 'Zellij Version'
        required: true
        default: 'v0.43.1'
      bun_version:
        description: 'Bun Version'
        required: true
        default: 'bun-v1.3.10'
      code_server_version:
        description: 'Code-Server Version'
        required: true
        default: '4.109.5'
      nvm_version:
        description: 'NVM Version'
        required: true
        default: 'v0.40.4'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TTYD_VERSION=${{ github.event.inputs.ttyd_version || '1.7.7' }}
            ZELLIJ_VERSION=${{ github.event.inputs.zellij_version || 'v0.43.1' }}
            BUN_VERSION=${{ github.event.inputs.bun_version || 'bun-v1.3.10' }}
            CODE_SERVER_VERSION=${{ github.event.inputs.code_server_version || '4.109.5' }}
            NVM_VERSION=${{ github.event.inputs.nvm_version || 'v0.40.4' }}
